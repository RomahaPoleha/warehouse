meta:
  environment: python
  toolchain:
    name: pip
    version: "3.11"
build:
  requirementsPath: requirements.txt
  useCache: true
  beforeInstall:
    - mkdir -p staticfiles
run:
  scriptName: null
  # Создаём папку ПЕРЕД запуском gunicorn:
  command: mkdir -p /app/staticfiles && gunicorn warehouse.wsgi:application --bind 0.0.0.0:80
  persistenceMount: /data
  containerPort: "80"
  servicePort: "80"
